
<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00573c;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#047857;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#064e3b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="docGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f8fafc;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background rounded square with green gradient -->
  <rect x="4" y="4" width="56" height="56" rx="12" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- Single Document icon in center -->
  <g transform="translate(32, 32)">
    <!-- Main document body -->
    <rect x="-12" y="-16" width="24" height="32" rx="2" fill="url(#docGrad)" stroke="#10b981" stroke-width="0.5"/>

    <!-- Document corner fold -->
    <path d="M8,-16 L8,-10 L14,-10 Z" fill="#e2e8f0" opacity="0.7"/>

    <!-- Document lines -->
    <rect x="-9" y="-10" width="14" height="1.5" rx="0.5" fill="#00573c" opacity="0.8"/>
    <rect x="-9" y="-7.5" width="11" height="1.2" rx="0.5" fill="#00573c" opacity="0.7"/>
    <rect x="-9" y="-5" width="16" height="1.2" rx="0.5" fill="#00573c" opacity="0.7"/>
    <rect x="-9" y="-2.5" width="13" height="1.2" rx="0.5" fill="#00573c" opacity="0.6"/>
    <rect x="-9" y="0" width="15" height="1.2" rx="0.5" fill="#00573c" opacity="0.6"/>
    <rect x="-9" y="2.5" width="10" height="1.2" rx="0.5" fill="#00573c" opacity="0.5"/>
    <rect x="-9" y="5" width="12" height="1.2" rx="0.5" fill="#00573c" opacity="0.5"/>
    <rect x="-9" y="7.5" width="8" height="1.2" rx="0.5" fill="#00573c" opacity="0.4"/>
    <rect x="-9" y="10" width="14" height="1.2" rx="0.5" fill="#00573c" opacity="0.4"/>
  </g>

  <!-- Corner highlights for depth -->
  <rect x="4" y="4" width="56" height="56" rx="12" fill="none" stroke="rgba(16, 185, 129, 0.3)" stroke-width="1"/>
</svg>
